version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
customHeaders:
  - pattern: '**/*.{js,css,woff,woff2,ttf,eot,svg,png,jpg,jpeg,webp,avif}'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
  - pattern: /index.html
    headers:
      - key: Cache-Control
        value: 'no-cache, no-store, must-revalidate'
      - key: X-Frame-Options
        value: 'DENY'
      - key: X-Content-Type-Options
        value: 'nosniff'
      - key: Referrer-Policy
        value: 'strict-origin-when-cross-origin'
      - key: X-XSS-Protection
        value: '1; mode=block'
